services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: chatboot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatboot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chatboot}
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatboot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: chatboot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- App (Express API + WebSocket) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatboot-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:5050"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatboot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chatboot}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 5050
      TZ: America/Argentina/Buenos_Aires
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5050/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # NOTA: Nginx y Certbot NO se usan en esta configuracion.
  # SSL lo maneja el nginx del HOST (/etc/nginx/sites-enabled/chatbot-lasgrutas)
  # con certificados de Certbot instalados directamente en el host.
  # El nginx del host hace proxy_pass a localhost:5050 (port mapping del app container).

volumes:
  pgdata:
  redisdata:
