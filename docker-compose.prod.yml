services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: chatboot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatboot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chatboot}
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatboot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: chatboot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- App (Express API + WebSocket) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatboot-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatboot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chatboot}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 5050
      TZ: America/Argentina/Buenos_Aires
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5050/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Nginx (SSL termination + reverse proxy) ---
  nginx:
    image: nginx:alpine
    container_name: chatboot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy

  # --- Certbot (SSL certificates) ---
  certbot:
    image: certbot/certbot
    container_name: chatboot-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot

volumes:
  pgdata:
  redisdata:
  certbot-etc:
  certbot-var:
  certbot-www:
